# Dependabot version updates: check daily, propose every new version of every
# dependency (no cooldown, no grouping — one PR per update), all semver levels.
# PRs are auto-merged on green CI by .github/workflows/dependabot-auto-merge.yml.
version: 2
updates:
  # NuGet packages for the .NET projects (agentic.slnx at repo root).
  - package-ecosystem: "nuget"
    directory: "/"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 20

  # npm packages for the Playwright test suite.
  - package-ecosystem: "npm"
    directory: "/tests/playwright"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 20

  # Action versions in .github/workflows/*.yml.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 20
