name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  # Existing job: .NET build + xUnit tests.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v6
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Test
        run: dotnet test --no-build -c Release

  # Priority 1 (bash -n syntax gate) + Priorities 2, 3, 5 (smoke + meta.json + error paths).
  # Runs on windows-latest because start-phone.sh is Windows-specific: it uses `taskkill`,
  # `powershell` for env-var registry lookup, and is designed for Git Bash. The
  # windows-latest runner image ships with `cloudflared`, `jq`, and Git Bash preinstalled.
  start-phone-tests:
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v6
        with:
          dotnet-version: '10.0.x'

      - name: Install cloudflared (not preinstalled on windows-latest)
        run: |
          # The script uses cloudflared for the tunnel; windows-latest doesn't ship it.
          # Download the standalone .exe into Git Bash's /usr/bin so it's on PATH.
          curl -fsSL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-windows-amd64.exe -o /usr/bin/cloudflared.exe
          chmod +x /usr/bin/cloudflared.exe
          cloudflared --version

      - name: bash syntax check (priority 1)
        run: bash -n start-phone.sh

      - name: Run start-phone test suite (priorities 2, 3, 5)
        run: bash tests/start-phone/run-tests.sh
        env:
          # Same fake-key pattern as Agentic.Chat.Tests/ProgramTests.cs. Not a real key;
          # the smoke test only loads /chat (no OpenRouter call). Setting it as an env
          # var short-circuits the script's Windows-registry lookup.
          OPENROUTER_API_KEY: test-only-fake-key-not-real-no-network

  # Priority 4: Playwright browser tests for the Blazor reconnect UI.
  # Runs on ubuntu-latest because the webServer only needs `dotnet run` (no Windows-specific
  # commands); the ReconnectModal.razor.js handler under test is browser-side and OS-agnostic.
  playwright-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v6
        with:
          dotnet-version: '10.0.x'

      - uses: actions/setup-node@v7
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: tests/playwright/package.json

      - name: Install Playwright + chromium browser
        working-directory: tests/playwright
        run: |
          npm install
          npx playwright install --with-deps chromium

      - name: Run Playwright tests (priority 4)
        working-directory: tests/playwright
        run: npx playwright test
        env:
          OPENROUTER_API_KEY: test-only-fake-key-not-real-no-network

      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: tests/playwright/playwright-report/
          retention-days: 7
