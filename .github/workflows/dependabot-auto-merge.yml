name: Dependabot auto-merge

# Enable auto-merge on every Dependabot PR, so it lands on main as soon as the
# required CI checks pass. Branch protection remains the gate: a bump that
# breaks the build or tests never merges, it just sits as an open PR.
#
# Workflows triggered by Dependabot get a read-only GITHUB_TOKEN by default;
# the explicit permissions block below restores the write access this needs.

on: pull_request

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: github.event.pull_request.user.login == 'dependabot[bot]'
    steps:
      - name: Enable auto-merge (squash)
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
